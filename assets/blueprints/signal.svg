<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <title>Signalized Intersection</title>
  <defs>
    <linearGradient id="sg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f2035"/>
    </linearGradient>
    <filter id="sg-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="280" height="280" fill="url(#sg-bg)" rx="16"/>
  <rect x="8" y="8" width="264" height="264" fill="none" stroke="#1a3a5c" stroke-width="0.5" rx="12" stroke-dasharray="4 3"/>
  <!-- Grid -->
  <line x1="0" y1="70" x2="280" y2="70" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="0" y1="140" x2="280" y2="140" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="0" y1="210" x2="280" y2="210" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="70" y1="0" x2="70" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="140" y1="0" x2="140" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="210" y1="0" x2="210" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <!-- Horizontal road -->
  <rect x="0" y="122" width="280" height="36" fill="#1e3a5f" rx="2"/>
  <line x1="0" y1="140" x2="122" y2="140" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="8 6" opacity="0.5"/>
  <line x1="158" y1="140" x2="280" y2="140" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Lane dividers horizontal -->
  <line x1="0" y1="133" x2="122" y2="133" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="158" y1="133" x2="280" y2="133" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="0" y1="147" x2="122" y2="147" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="158" y1="147" x2="280" y2="147" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <!-- Vertical road -->
  <rect x="122" y="0" width="36" height="280" fill="#1e3a5f" rx="2"/>
  <line x1="140" y1="0" x2="140" y2="122" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="8 6" opacity="0.5"/>
  <line x1="140" y1="158" x2="140" y2="280" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Lane dividers vertical -->
  <line x1="133" y1="0" x2="133" y2="122" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="133" y1="158" x2="133" y2="280" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="147" y1="0" x2="147" y2="122" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="147" y1="158" x2="147" y2="280" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="4 4" opacity="0.3"/>
  <!-- Intersection box -->
  <rect x="122" y="122" width="36" height="36" fill="#162d4a" stroke="#ef4444" stroke-width="1" rx="2"/>
  <!-- Crosswalk markings -->
  <line x1="122" y1="118" x2="158" y2="118" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="122" y1="162" x2="158" y2="162" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="118" y1="122" x2="118" y2="158" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="162" y1="122" x2="162" y2="158" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <!-- Traffic signal -->
  <rect x="133" y="130" width="14" height="20" fill="#0f2035" stroke="#ef4444" stroke-width="1.2" rx="3"/>
  <circle cx="140" cy="135" r="2.5" fill="#ef4444" filter="url(#sg-glow)"/>
  <circle cx="140" cy="140" r="2.5" fill="#eab308" opacity="0.6"/>
  <circle cx="140" cy="145" r="2.5" fill="#22c55e" opacity="0.4"/>
  <!-- Stop lines -->
  <line x1="122" y1="122" x2="100" y2="122" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="158" y1="158" x2="180" y2="158" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="122" y1="158" x2="122" y2="180" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="158" y1="122" x2="158" y2="100" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <!-- Direction arrows -->
  <polygon points="20,140 35,134 35,146" fill="#ef4444" opacity="0.7"/>
  <polygon points="260,140 245,134 245,146" fill="#ef4444" opacity="0.7"/>
  <polygon points="140,20 134,35 146,35" fill="#ef4444" opacity="0.7"/>
  <polygon points="140,260 134,245 146,245" fill="#ef4444" opacity="0.7"/>
  <!-- Labels -->
  <text x="140" y="268" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="2">SIGNALIZED</text>
  <text x="140" y="20" font-family="'Courier New',monospace" font-size="7" fill="#4a7a9b" text-anchor="middle" letter-spacing="1">AT-GRADE SIGNAL CONTROL</text>
</svg>
