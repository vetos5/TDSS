<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <title>DDI  Diverging Diamond Interchange</title>
  <defs>
    <linearGradient id="dd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f2035"/>
    </linearGradient>
    <filter id="dd-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="280" height="280" fill="url(#dd-bg)" rx="16"/>
  <rect x="8" y="8" width="264" height="264" fill="none" stroke="#1a3a5c" stroke-width="0.5" rx="12" stroke-dasharray="4 3"/>
  <!-- Grid -->
  <line x1="0" y1="70" x2="280" y2="70" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="0" y1="140" x2="280" y2="140" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="0" y1="210" x2="280" y2="210" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="70" y1="0" x2="70" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="140" y1="0" x2="140" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <line x1="210" y1="0" x2="210" y2="280" stroke="#1a3a5c" stroke-width="0.3"/>
  <!-- Highway (horizontal) -->
  <rect x="0" y="128" width="280" height="24" fill="#1e3a5f" rx="2"/>
  <line x1="0" y1="140" x2="280" y2="140" stroke="#d97706" stroke-width="0.6" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Arterial (vertical) -->
  <rect x="122" y="0" width="36" height="280" fill="#162d4a" rx="2"/>
  <!-- DDI crossover pattern  traffic crosses to opposite side -->
  <!-- Left crossover zone -->
  <line x1="122" y1="80" x2="158" y2="105" stroke="#d97706" stroke-width="5" stroke-linecap="round" filter="url(#dd-glow)"/>
  <line x1="158" y1="80" x2="122" y2="105" stroke="#d97706" stroke-width="5" stroke-linecap="round" filter="url(#dd-glow)"/>
  <!-- Right crossover zone -->
  <line x1="122" y1="175" x2="158" y2="200" stroke="#d97706" stroke-width="5" stroke-linecap="round" filter="url(#dd-glow)"/>
  <line x1="158" y1="175" x2="122" y2="200" stroke="#d97706" stroke-width="5" stroke-linecap="round" filter="url(#dd-glow)"/>
  <!-- Connecting lanes between crossovers (reversed traffic) -->
  <line x1="158" y1="105" x2="158" y2="128" stroke="#d97706" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="122" y1="105" x2="122" y2="128" stroke="#d97706" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="158" y1="152" x2="158" y2="175" stroke="#d97706" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="122" y1="152" x2="122" y2="175" stroke="#d97706" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Ramps to highway -->
  <path d="M 158 115 Q 200 120 210 128" fill="none" stroke="#d97706" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 122 115 Q 80 120 70 128" fill="none" stroke="#d97706" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 158 165 Q 200 160 210 152" fill="none" stroke="#d97706" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 122 165 Q 80 160 70 152" fill="none" stroke="#d97706" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Crossover signal dots -->
  <circle cx="140" cy="92" r="5" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="140" cy="92" r="2" fill="#d97706"/>
  <circle cx="140" cy="188" r="5" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="140" cy="188" r="2" fill="#d97706"/>
  <!-- Bridge indicator -->
  <rect x="118" y="124" width="44" height="32" fill="#0f2035" stroke="#d97706" stroke-width="1" rx="3" opacity="0.8"/>
  <!-- Direction arrows -->
  <polygon points="20,140 35,134 35,146" fill="#d97706" opacity="0.7"/>
  <polygon points="260,140 245,134 245,146" fill="#d97706" opacity="0.7"/>
  <polygon points="140,20 134,35 146,35" fill="#d97706" opacity="0.5"/>
  <polygon points="140,260 134,245 146,245" fill="#d97706" opacity="0.5"/>
  <!-- Labels -->
  <text x="140" y="268" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#d97706" text-anchor="middle" letter-spacing="3">DDI</text>
  <text x="140" y="20" font-family="'Courier New',monospace" font-size="7" fill="#4a7a9b" text-anchor="middle" letter-spacing="1">DIVERGING DIAMOND</text>
</svg>
